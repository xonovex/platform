name: Setup
description: Cache npm and moon toolchain with Nix

inputs:
  cache-workspace:
    description: "Cache ~/.npm and .moon/cache"
    default: "true"

runs:
  using: composite
  steps:
    - if: inputs.cache-workspace != 'false'
      uses: actions/cache@v4
      with:
        path: |
          ~/.npm
          .moon/cache
        key: npm-moon-${{ runner.os }}-${{ hashFiles('package-lock.json', '.moon/**/*.yml') }}
        restore-keys: |
          npm-moon-${{ runner.os }}

    - uses: cachix/install-nix-action@v31
      with:
        install_options: --no-daemon

    - uses: moonrepo/setup-toolchain@v0
