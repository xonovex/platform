name: Setup
description: Cache npm, Go, and the Nix store, then install Nix

inputs:
  cache-workspace:
    description: "Cache ~/.npm and .moon/cache"
    default: "true"

runs:
  using: composite
  steps:
    - if: inputs.cache-workspace != 'false'
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: |
          ~/.npm
          .moon/cache
        key: npm-moon-${{ runner.os }}-${{ hashFiles('package-lock.json', '.moon/**/*.yml') }}
        restore-keys: |
          npm-moon-${{ runner.os }}

    - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
          ~/.cache/golangci-lint
        key: go-${{ runner.os }}-${{ hashFiles('**/go.sum', '**/.golangci.yml') }}
        restore-keys: |
          go-${{ runner.os }}-

    # Cargo registry + the wasm32-wasip1 dependency rlibs for the moon-nix-toolchain
    # plugin. Salted on flake.lock (which pins rustc via rust-overlay) so a toolchain
    # bump invalidates stale artifacts; excludes the final *.wasm (moon's own output).
    - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: |
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          packages/moon/moon-nix-toolchain/target/wasm32-wasip1/release/deps
          packages/moon/moon-nix-toolchain/target/wasm32-wasip1/release/.fingerprint
        key: cargo-wasm-${{ runner.os }}-${{ hashFiles('flake.lock', 'packages/moon/moon-nix-toolchain/Cargo.lock') }}
        restore-keys: |
          cargo-wasm-${{ runner.os }}-

    - uses: nixbuild/nix-quick-install-action@9f63be77f412a248c9d9a65a4c82cf066cdf8f0c # v35
      with:
        github_access_token: ${{ github.token }}
        nix_conf: |
          keep-env-derivations = true
          keep-outputs = true
          experimental-features = nix-command flakes

    - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
      with:
        primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-
        gc-max-store-size-linux: 5368709120
        purge: true
        purge-prefixes: nix-${{ runner.os }}-
        purge-primary-key: never
        purge-last-accessed: P1DT12H
