name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      cache-workspace:
        description: "Cache .moon/cache and node_modules"
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      actions: write # cache-nix-action purge deletes old caches via the Actions cache API

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/setup-nix
        with:
          cache-workspace: ${{ inputs.cache-workspace }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: packages/moon/moon-nix-toolchain
          cmd-format: nix develop -c {0}
          key: ${{ hashFiles('flake.lock') }}
          # Save only on main; PRs restore from main's cache (avoids every PR branch
          # saving a ~260MB cache and thrashing the repo's Actions cache budget).
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - run: nix develop --command zizmor --offline .github/

      - run: rm -f .moon/cache/runReport.json
      - run: nix develop --command bash -c "npm ci && npx moon ci --color --concurrency 4 :ci-check"
        env:
          # Lets moon resolve the github:// nix toolchain plugin without API rate limits.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: moonrepo/run-report-action@bbe7e99bf2aca819ec660ec01fc59d84bdd492d6 # v1
        if: success() || failure()
        with:
          access-token: ${{ secrets.GITHUB_TOKEN }}
