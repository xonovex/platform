name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      cache-workspace:
        description: "Cache .moon/cache and node_modules"
        type: boolean
        default: true
      dry_run:
        description: "Perform a dry run (no actual publishing)"
        type: boolean
        default: true
      base:
        description: "Base ref for affected detection (e.g. HEAD~1, v0.1.18)"
        type: string
        default: "HEAD~1"
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true && contains(github.event.pull_request.title, 'version packages'))

    permissions:
      contents: write
      id-token: write
      packages: write
      actions: write # cache-nix-action purge deletes old caches via the Actions cache API

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/setup-nix
        with:
          cache-workspace: ${{ inputs.cache-workspace }}

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - run: rm -f .moon/cache/runReport.json

      - name: Publish
        if: inputs.dry_run != true
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE: ${{ inputs.base || 'HEAD~1' }}
        run: |
          nix develop --command bash -c "npm ci && npx moon ci --color --concurrency 1 --base $BASE :ci-publish"

      - name: Publish (dry run)
        if: inputs.dry_run == true
        env:
          BASE: ${{ inputs.base || 'HEAD~1' }}
        run: |
          nix develop --command bash -c "npm ci && npx moon ci --color --concurrency 1 --base $BASE :ci-publish-dry-run"

      - uses: moonrepo/run-report-action@bbe7e99bf2aca819ec660ec01fc59d84bdd492d6 # v1
        if: success() || failure()
        with:
          access-token: ${{ secrets.GITHUB_TOKEN }}
