$schema: https://moonrepo.dev/schemas/tasks.json
implicitInputs:
- package.json
- tsconfig*.json
fileGroups:
  sources:
  - src/**/*
  tests:
  - src/**/*.test.*
  - src/**/*.spec.*
  - test/**/*
  configs:
  - '*.config.*'
  - .eslintrc*
  - .prettierrc*
tasks:
  ts-build:
    deps:
    - ^:build
    script: npx tsc
    inputs:
    - '@globs(sources)'
    - tsconfig*.json
    outputs:
    - dist
    options:
      cache: true
  ts-test:
    script: npx vitest run
    deps:
    - ^:build
    inputs:
    - '@globs(sources)'
    - '@globs(tests)'
    - '@globs(configs)'
    outputs: []
    options:
      cache: true
  ts-test-watch:
    script: npx vitest
    deps:
    - ^:build
    options:
      cache: false
      persistent: true
    preset: server
  ts-lint:
    script: npx eslint src
    deps:
    - ts-build
    - ^:build
    inputs:
    - '@globs(sources)'
    - '@globs(tests)'
    - '@globs(configs)'
    outputs: []
    options:
      cache: true
  ts-lint-fix:
    script: npx eslint src --fix
    deps:
    - ts-build
    - ^:build
    inputs:
    - '@globs(sources)'
    - '@globs(tests)'
    - '@globs(configs)'
    outputs: []
    options:
      cache: false
  ts-format:
    script: npx prettier --write .
    inputs:
    - '@globs(sources)'
    - '@globs(tests)'
    - '@globs(configs)'
    - '*.json'
    - '*.md'
    outputs: []
    options:
      cache: false
  ts-format-check:
    script: npx prettier --check .
    inputs:
    - '@globs(sources)'
    - '@globs(tests)'
    - '@globs(configs)'
    - '*.json'
    - '*.md'
    outputs: []
    options:
      cache: true
  ts-typecheck:
    script: npx tsc --noEmit
    deps:
    - ts-build
    - ^:build
    inputs:
    - '@globs(sources)'
    - '@globs(tests)'
    - tsconfig*.json
    outputs: []
    options:
      cache: true
  ts-coverage:
    script: npx vitest run --coverage
    deps:
    - ^:build
    inputs:
    - '@globs(sources)'
    - '@globs(tests)'
    - '@globs(configs)'
    outputs:
    - coverage
    options:
      cache: true
  build:
    command: noop
    deps: [ts-build]
    options:
      cache: false
      mergeDeps: append
  lint:
    command: noop
    deps: [ts-lint]
    options:
      cache: false
      mergeDeps: append
  typecheck:
    command: noop
    deps: [ts-typecheck]
    options:
      cache: false
      mergeDeps: append
  test:
    command: noop
    deps: [ts-test]
    options:
      cache: false
      mergeDeps: append
  format-check:
    command: noop
    deps: [ts-format-check]
    options:
      cache: false
      mergeDeps: append
  ci-check:
    command: echo 'ci-check complete'
    deps:
    - build
    - lint
    - typecheck
    - test
    - format-check
    options:
      cache: false
inheritedBy:
  tag: typescript
