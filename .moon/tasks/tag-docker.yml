$schema: https://moonrepo.dev/schemas/tasks.json
inheritedBy:
  tag: docker
fileGroups:
  dockerfiles:
    - Dockerfile
    - Dockerfile*
    - docker/**/Dockerfile*
tasks:
  docker-lint:
    command:
      - hadolint
      - Dockerfile
    inputs:
      - '@globs(dockerfiles)'
    outputs: []
    options:
      cache: true
  lint:
    command: noop
    deps: [docker-lint]
    options:
      cache: false
      mergeDeps: append
  ci-check:
    command: echo 'ci-check complete'
    deps: [lint]
    options:
      cache: false
