$schema: https://moonrepo.dev/schemas/tasks.json
tasks:
  fmt:
    command: [npm, run, fmt]
    inputs:
      - "**/*.md"
      - "*.config.*"
      - package.json
    outputs: []
    options:
      cache: false
      runInCI: false
  fmt-check:
    command: [npm, run, "fmt:check"]
    inputs:
      - "**/*.md"
      - "*.config.*"
      - package.json
    outputs: []
  ci-check:
    command: echo 'ci-check complete'
    deps: [build]
    options:
      cache: false
  validate:
    command:
      - npx
      - moon-skill-validate
    deps:
      - target: ~:build
        optional: true
      - script-moon-skill-validate:install
    options:
      cache: false
      runInCI: false
  audit-sources:
    command:
      - npx
      - moon-skill-audit-sources
    deps:
      - target: ~:build
        optional: true
      - script-moon-skill-audit-sources:install
    options:
      cache: false
      runInCI: false
  eval-triggers:
    command:
      - npx
      - moon-skill-eval-triggers
    deps:
      - target: ~:build
        optional: true
      - script-moon-skill-eval-triggers:install
    options:
      cache: false
      runInCI: false
  eval-outputs:
    command:
      - npx
      - moon-skill-eval-outputs
    deps:
      - target: ~:build
        optional: true
      - script-moon-skill-eval-outputs:install
    options:
      cache: false
      runInCI: false
inheritedBy:
  tag: skill
