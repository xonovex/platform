$schema: https://moonrepo.dev/schemas/tasks.json
tasks:
  skill-format:
    command: [npm, run, fmt]
    inputs:
      - "**/*.md"
      - "*.config.*"
      - package.json
    outputs: []
    options:
      cache: false
      runInCI: false
  skill-format-check:
    command: [npm, run, "fmt:check"]
    inputs:
      - "**/*.md"
      - "*.config.*"
      - package.json
    outputs: []
  format:
    command: noop
    deps: [skill-format]
    options:
      cache: false
      runInCI: false
      mergeDeps: append
  format-check:
    command: noop
    deps: [skill-format-check]
    options:
      cache: false
      mergeDeps: append
  ci-check:
    command: echo 'ci-check complete'
    deps: [build, format-check, skill-validate]
    options:
      cache: false
  skill-validate:
    command:
      - npx
      - moon-skill-validate
    deps:
      - target: ~:build
        optional: true
      - script-moon-skill-validate:install
    options:
      cache: false
  skill-audit-sources:
    command:
      - npx
      - moon-skill-audit-sources
    deps:
      - target: ~:build
        optional: true
      - script-moon-skill-audit-sources:install
    options:
      cache: false
      runInCI: false
  skill-eval-triggers:
    command:
      - npx
      - moon-skill-eval-triggers
    deps:
      - target: ~:build
        optional: true
      - script-moon-skill-eval-triggers:install
    options:
      cache: false
      runInCI: false
  skill-eval-outputs:
    command:
      - npx
      - moon-skill-eval-outputs
    deps:
      - target: ~:build
        optional: true
      - script-moon-skill-eval-outputs:install
    options:
      cache: false
      runInCI: false
inheritedBy:
  tag: skill
