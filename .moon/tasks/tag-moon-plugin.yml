# WASM moon-plugin tasks (Rust -> wasm32-wasip1 build, test, and GitHub-release publish).
# Projects tagged `moon-plugin` must also carry the `rust` tag, which supplies the
# `sources`/`tests` fileGroups and the `lint`/`fmt-check` tasks referenced here.
$schema: https://moonrepo.dev/schemas/tasks.json
tasks:
  build:
    script: |
      set -euo pipefail
      cargo build --release --target wasm32-wasip1
      shopt -s nullglob
      for wasm in target/wasm32-wasip1/release/*.wasm; do
        wasm-opt -Os --all-features "$wasm" -o "$wasm"
        wasm-strip "$wasm"
      done
    toolchain: [system, nix]
    inputs:
      - '@globs(sources)'
      - Cargo.toml
      - Cargo.lock
    outputs:
      - 'target/wasm32-wasip1/release/*.wasm'
    options:
      cache: true
  test:
    command:
      - cargo
      - test
    toolchain: [system, nix]
    deps:
      - build
    inputs:
      - '@globs(sources)'
      - '@globs(tests)'
      - Cargo.toml
      - Cargo.lock
    options:
      cache: true
  ci-check:
    command: echo 'ci-check complete'
    deps:
      - build
      - test
      - lint
      - fmt-check
    options:
      cache: false
  github-check:
    script: |
      set -euo pipefail
      name=$(awk -F'"' '/^name *= /{print $2; exit}' Cargo.toml)
      version=$(awk -F'"' '/^version *= /{print $2; exit}' Cargo.toml)
      [ -n "$name" ] && [ -n "$version" ] || { echo "Cargo.toml: name/version not found" >&2; exit 1; }
      grep -qE "^## ${version}( |$)" CHANGELOG.md || { echo "CHANGELOG.md has no '## ${version}' section" >&2; exit 1; }
      shopt -s nullglob
      wasms=(target/wasm32-wasip1/release/*.wasm)
      [ "${#wasms[@]}" -gt 0 ] || { echo "no .wasm artifact found (run build first)" >&2; exit 1; }
      for wasm in "${wasms[@]}"; do
        [ -s "$wasm" ] || { echo "$wasm is empty" >&2; exit 1; }
        wasm-validate --enable-all "$wasm"
      done
      echo "${name}-v${version}: ${#wasms[@]} valid wasm artifact(s) + changelog entry, ready to publish"
    toolchain: [system, nix]
    deps:
      - build
    options:
      cache: false
  github-publish:
    script: |
      set -euo pipefail
      name=$(awk -F'"' '/^name *= /{print $2; exit}' Cargo.toml)
      version=$(awk -F'"' '/^version *= /{print $2; exit}' Cargo.toml)
      tag="${name}-v${version}"
      if gh release view "$tag" >/dev/null 2>&1; then
        echo "release ${tag} already exists; bump the version to publish (skipping)"
        exit 0
      fi
      notes=$(awk '/^## /{if(p)exit; p=1} p' CHANGELOG.md)
      [ -n "$notes" ] || notes="$tag"
      ( cd target/wasm32-wasip1/release && shopt -s nullglob
        for wasm in *.wasm; do sha256sum "$wasm" > "$wasm.sha256"; done )
      assets=(target/wasm32-wasip1/release/*.wasm target/wasm32-wasip1/release/*.sha256)
      gh release create "$tag" "${assets[@]}" --target "$(git rev-parse HEAD)" --title "$tag" --notes "$notes"
    toolchain: [system, nix]
    deps:
      - build
      - github-check
    options:
      cache: false
  github-publish-dry-run:
    script: |
      set -euo pipefail
      name=$(awk -F'"' '/^name *= /{print $2; exit}' Cargo.toml)
      version=$(awk -F'"' '/^version *= /{print $2; exit}' Cargo.toml)
      tag="${name}-v${version}"
      ( cd target/wasm32-wasip1/release && shopt -s nullglob
        for wasm in *.wasm; do sha256sum "$wasm" > "$wasm.sha256"; done )
      if gh release view "$tag" >/dev/null 2>&1; then
        echo "[dry-run] release ${tag} already exists; would SKIP (bump version to publish)"
      else
        echo "[dry-run] would create release ${tag} (target $(git rev-parse --short HEAD)) with notes:"
        awk '/^## /{if(p)exit; p=1} p' CHANGELOG.md
      fi
      ls -l target/wasm32-wasip1/release/*.wasm target/wasm32-wasip1/release/*.sha256
    toolchain: [system, nix]
    deps:
      - build
      - github-check
    options:
      cache: false
  ci-publish:
    command: echo 'ci-publish complete'
    deps:
      - github-publish
    options:
      cache: false
  ci-publish-dry-run:
    command: echo 'ci-publish-dry-run complete'
    deps:
      - github-publish-dry-run
    options:
      cache: false
inheritedBy:
  tag: moon-plugin
