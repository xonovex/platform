$schema: https://moonrepo.dev/schemas/tasks.json
implicitInputs:
- go.mod
- go.sum
fileGroups:
  sources:
  - '**/*.go'
  tests:
  - '**/*_test.go'
  configs:
  - go.mod
  - go.sum
  - .golangci.yml
tasks:
  go-build:
    deps:
    - ^:build
    command:
    - go
    - build
    - ./...
    toolchain: [system, nix]
    inputs:
    - '@globs(sources)'
    - go.mod
    - go.sum
    outputs: []
    options:
      cache: true
  go-test:
    command:
    - go
    - test
    - -v
    - ./...
    toolchain: [system, nix]
    deps:
    - ^:go-build
    inputs:
    - '@globs(sources)'
    - '@globs(tests)'
    outputs: []
    options:
      cache: true
  go-test-coverage:
    command:
    - go
    - test
    - -v
    - -coverprofile=coverage.out
    - ./...
    toolchain: [system, nix]
    deps:
    - ^:go-build
    inputs:
    - '@globs(sources)'
    - '@globs(tests)'
    outputs:
    - coverage.out
    options:
      cache: true
  go-lint:
    command:
    - golangci-lint
    - run
    - --allow-parallel-runners
    - ./...
    toolchain: [system, nix]
    inputs:
    - '@globs(sources)'
    - '@globs(tests)'
    - .golangci.yml
    outputs: []
    options:
      cache: false
  go-format:
    command:
    - go
    - fmt
    - ./...
    toolchain: [system, nix]
    inputs:
    - '@globs(sources)'
    - '@globs(tests)'
    outputs: []
    options:
      cache: false
  go-format-check:
    command:
    - bash
    - -c
    - test -z "$(gofmt -l .)"
    toolchain: [system, nix]
    inputs:
    - '@globs(sources)'
    - '@globs(tests)'
    outputs: []
    options:
      cache: true
  go-typecheck:
    command:
    - go
    - vet
    - ./...
    toolchain: [system, nix]
    deps:
    - ^:go-build
    inputs:
    - '@globs(sources)'
    - '@globs(tests)'
    outputs: []
    options:
      cache: true
  go-tidy:
    command:
    - go
    - mod
    - tidy
    toolchain: [system, nix]
    inputs:
    - go.mod
    - go.sum
    outputs:
    - go.mod
    - go.sum
    options:
      cache: false
  build:
    command: noop
    deps: [go-build]
    options:
      cache: false
      mergeDeps: append
  lint:
    command: noop
    deps: [go-lint]
    options:
      cache: false
      mergeDeps: append
  typecheck:
    command: noop
    deps: [go-typecheck]
    options:
      cache: false
      mergeDeps: append
  test:
    command: noop
    deps: [go-test]
    options:
      cache: false
      mergeDeps: append
  format-check:
    command: noop
    deps: [go-format-check]
    options:
      cache: false
      mergeDeps: append
  ci-check:
    command: echo 'ci-check complete'
    deps: [build, lint, typecheck, test, format-check]
    options:
      cache: false
  go-clean:
    script: rm -rf dist coverage.out
    options:
      cache: false
inheritedBy:
  tag: go
