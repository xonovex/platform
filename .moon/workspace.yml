$schema: https://moonrepo.dev/schemas/workspace.json
projects:
  - packages/asset/*
  - packages/diagram/*
  - packages/skill/*
  - packages/command/*
  - packages/config/*
  - packages/agent/*
  - packages/shared/*
  - packages/docker/*
  - packages/script/*
  - packages/moon/*
vcs:
  hooks:
    commit-msg:
      - npx commitlint --edit $ARG1
    pre-commit:
      - .hooks/validate-lockfile.sh
      - unset $(git rev-parse --local-env-vars 2>/dev/null || echo '') && .hooks/run-quality-checks.sh --staged --targets :lint,:typecheck,:test,:fmt-check --concurrency 4
  provider: github
  defaultBranch: main
  client: git
  sync: true
constraints:
  enforceLayerRelationships: true
hasher:
  optimization: performance
  walkStrategy: vcs
pipeline:
  autoCleanCache: true
  cacheLifetime: 7 days
  inheritColorsForPipedTasks: true
  logRunningCommand: true
# Self-hosted moon remote cache (Bazel RE API — e.g. bazel-remote, or Depot).
# DISABLED (commented out). To enable: run a bazel-remote server (or use Depot),
# uncomment the block below, set MOON_REMOTE_TOKEN, and point `host` at the server
# (or export MOON_REMOTE_HOST=grpc://cache.host:9092). The auth token gate means moon
# stays disabled until MOON_REMOTE_TOKEN exists; zstd needs a matching server mode.
# remote:
#   host: 'grpc://cache.host:9092'
#   cache:
#     compression: 'zstd'
#   auth:
#     token: 'MOON_REMOTE_TOKEN'
