$schema: https://moonrepo.dev/schemas/toolchain.json
go:
  version: null
npm:
  version: null
node:
  version: null
typescript:
  createMissingConfig: false
  syncProjectReferences: true
  syncProjectReferencesToPaths: true
javascript:
  packageManager: npm
  syncPackageManagerField: true
  syncProjectWorkspaceDependencies: true
  dependencyVersionFormat: version-caret
nix:
  plugin: 'github://xonovex/platform/moon_nix_toolchain@moon_nix_toolchain-v0.6.1'
  shellByTag:
    go: go
    shell: shell
    rust: rust
    moon-plugin: rust
