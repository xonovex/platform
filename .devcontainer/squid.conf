# Core Settings
http_port 3128
pid_filename none
max_filedesc 4096
coredump_dir /var/cache/squid

# Logging Configuration
logfile_rotate 0
access_log stdio:/proc/self/fd/1
cache_log stdio:/proc/self/fd/2

# Cache Settings
cache deny all
cache_mem 0 MB

# ACL Definitions
## Port Definitions
acl SSL_ports port 443
acl CONNECT method CONNECT

## AI Coding Agent APIs
acl anthropic dstdomain .anthropic.com
acl sentry dstdomain .sentry.io
acl copilot dstdomain .githubcopilot.com

## GitHub
acl github dstdomain .github.com .githubusercontent.com

## Docker Infrastructure
acl docker dstdomain hub.docker.com .docker.io .docker.com production.cloudflare.docker.com

## VS Code Marketplace and Extensions
acl vscode dstdomain marketplace.visualstudio.com .vscode-cdn.net vscode.blob.core.windows.net update.code.visualstudio.com az764295.vo.msecnd.net .vsassets.io

## JetBrains Infrastructure
acl jetbrains dstdomain .jetbrains.com

## Azure DevOps
acl azure dstdomain dev.azure.com vstsagentpackage.azureedge.net .applicationinsights.azure.com

## npm / Node.js
acl npm dstdomain registry.npmjs.org nodejs.org deb.nodesource.com

## Moon (monorepo task runner)
acl moonrepo dstdomain moonrepo.dev

## TLS Certificate Validation (CRL/OCSP)
acl tls_validation dstdomain .digicert.com .lencr.org .amazontrust.com

## Claude Code
acl claude dstdomain claude.ai .claude.com storage.googleapis.com downloads.claude.ai

# Access Rules
## SSL/HTTPS Rules
http_access deny CONNECT !SSL_ports

## Domain Access Rules
http_access allow anthropic
http_access allow sentry
http_access allow copilot
http_access allow github
http_access allow docker
http_access allow vscode
http_access allow jetbrains
http_access allow azure
http_access allow npm
http_access allow moonrepo
http_access allow tls_validation
http_access allow claude

## Default Policy
http_access deny all
