# =============================================================================
# Shared Domain Allowlist
#
# Single source of truth for both squid (HTTP proxy) and dnsmasq (DNS).
# The proxy entrypoint generates both configs from this file at startup.
#
# Format:
#   - One domain per line
#   - Leading dot means "domain and all subdomains" (e.g., .github.com
#     matches github.com, api.github.com, raw.github.com, etc.)
#   - Exact domain (no dot) matches only that specific hostname
#   - Lines starting with # are comments, blank lines are ignored
#
# To add a domain: add it here and restart the proxy container.
# Both squid ACLs and dnsmasq forwarding rules update automatically.
# =============================================================================

# AI Coding Agent APIs
.anthropic.com          # Claude API (api.anthropic.com), feature flags (statsig.anthropic.com)
.sentry.io              # Error reporting for coding agents
.githubcopilot.com      # GitHub Copilot (api.individual/enterprise/business.githubcopilot.com)

# GitHub
.github.com             # Repos, API, raw content, packages
.githubusercontent.com  # Raw file content, avatars, release assets

# Docker Infrastructure
hub.docker.com          # Docker Hub web interface
.docker.io              # Docker registry (registry-1.docker.io, auth.docker.io)
.docker.com             # Docker services
production.cloudflare.docker.com  # Docker CDN

# VS Code Marketplace and Extensions
marketplace.visualstudio.com     # Extension marketplace API
.vscode-cdn.net                  # VS Code CDN (main.vscode-cdn.net)
vscode.blob.core.windows.net     # VS Code binary blobs
update.code.visualstudio.com     # VS Code update checks
az764295.vo.msecnd.net           # VS Code CDN (Azure)
.vsassets.io                     # Extension assets (gallery/gallerycdn.vsassets.io)

# JetBrains Infrastructure
.jetbrains.com          # Downloads, plugins, cache, services

# Azure DevOps
dev.azure.com                    # Repos and pipelines
vstsagentpackage.azureedge.net   # Agent packages
.applicationinsights.azure.com   # VS Code telemetry

# npm / Node.js
registry.npmjs.org      # npm package registry
nodejs.org              # Node.js downloads
deb.nodesource.com      # NodeSource apt repository

# Moon (monorepo task runner)
moonrepo.dev            # Moon CLI downloads

# TLS Certificate Validation (CRL/OCSP)
# Required for TLS certificate chain verification. Without these,
# Bun (Claude Code's runtime) hangs on CRL/OCSP checks.
.digicert.com           # DigiCert CRL/OCSP endpoints
.lencr.org              # Let's Encrypt OCSP
.amazontrust.com        # Amazon/AWS certificate validation
.microsoft.com          # Microsoft CRL endpoints

# Claude Code
claude.ai               # Authentication for claude.ai accounts
.claude.com             # Console auth (platform.claude.com)
storage.googleapis.com  # Binary updates and auto-updater
downloads.claude.ai     # Install script, plugins, version manifests
