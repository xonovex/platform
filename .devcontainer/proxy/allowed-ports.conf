# =============================================================================
# Shared Port Allowlist — TCP Relay Rules
#
# Defines which host ports the proxy relays to the app container via socat.
# The entrypoint generates a socat process for each entry at startup.
#
# This is the single source of truth for host port access — developers
# request new port forwards via PR, just like domain access.
#
# Format:
#   profile:listen_port:target_host:target_port
#
#   - profile: compose profile that activates this relay (e.g., "android")
#   - listen_port: port the proxy listens on (app connects to proxy:<port>)
#   - target_host: where to forward (typically host.docker.internal)
#   - target_port: port on the target host
#   - Lines starting with # are comments, blank lines are ignored
#
# The app container connects to proxy:<listen_port>. The proxy forwards
# to <target_host>:<target_port>. Only explicitly listed ports are
# reachable — the app still cannot reach arbitrary host services.
# =============================================================================

# Android emulator — ADB server and first emulator pair
# Activate with: COMPOSE_PROFILES=android in .env
android:5037:host.docker.internal:5037   # ADB server (manages device connections)
android:5554:host.docker.internal:5554   # First emulator console
android:5555:host.docker.internal:5555   # First emulator ADB
