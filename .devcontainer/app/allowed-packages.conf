# =============================================================================
# Allowed Package Groups — Centrally Approved CLI Tools
#
# Defines which extra packages developers can install in the app container.
# Groups are activated via the PACKAGE_GROUPS build arg in .env.
#
# This is the single source of truth for approved tools — developers
# request new packages via PR. They cannot install arbitrary packages
# because the Dockerfile only reads from this file.
#
# Format:
#   [group-name]
#   package1
#   package2
#
#   - Group names in square brackets start a new group
#   - Package names are apt package names (one per line)
#   - Lines starting with # are comments, blank lines are ignored
#
# Activate groups in .env (gitignored):
#   PACKAGE_GROUPS=android,python
#
# The "base" group is always installed regardless of PACKAGE_GROUPS.
# =============================================================================

# Base tools — always installed, not selectable
[base]
git
curl
wget
unzip
jq
vim
nano
procps
build-essential
python3
bash

# Android development — ADB client for emulator access via proxy relay
# Requires: COMPOSE_PROFILES=android (for the port relay)
[android]
android-tools-adb

# Python development — pip and venv for Python workflows
[python]
python3-pip
python3-venv

# Database clients — CLI tools for database access
[database]
postgresql-client
default-mysql-client
redis-tools
