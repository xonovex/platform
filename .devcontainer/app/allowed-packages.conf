# =============================================================================
# Allowed Package Groups — Centrally Approved CLI Tools
#
# Defines which Nix package groups from flake.nix are installed in the
# app container. This is the single source of truth — developers request
# new groups or packages via PR.
#
# Format:
#   - One group name per line (must match a group in flake.nix)
#   - Lines starting with # are comments, blank lines are ignored
#
# Available groups (defined in flake.nix):
#   base        — git, curl, Node.js, gcc, etc. (always include this)
#   android     — adb, fastboot
#   python      — python3, pip, virtualenv
#   database    — postgresql, mysql, redis CLIs
#   kubernetes  — kubectl, kind, helm
#   go          — go, golangci-lint, gopls
#
# Requires container rebuild to take effect (devcontainer rebuild).
# =============================================================================

base
