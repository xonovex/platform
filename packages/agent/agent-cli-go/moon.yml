$schema: https://moonrepo.dev/schemas/project.json
language: go
layer: application
tags:
  - go
  - typescript
  - npm
  - cli
dependsOn:
  - shared-agent-go
  - shared-core-go
  - eslint-config-cli
  - ts-config-cli
tasks:
  ts-build:
    script: npx tsc
    deps:
      - eslint-config-cli:build
      - ts-config-cli:build
    inputs:
      - src/**/*.ts
      - tsconfig.json
    outputs:
      - dist
  ts-lint:
    script: npx eslint src
    deps:
      - eslint-config-cli:build
    inputs:
      - src/**/*.ts
  ts-test:
    script: echo 'no TypeScript tests'
    options:
      cache: false
  ci-check:
    script: echo 'ci-check complete'
    deps:
      - build
      - lint
      - typecheck
      - test
      - format-check
      - npm-check
    options:
      cache: false
  ci-publish:
    script: echo 'ci-publish complete'
    deps:
      - npm-publish
      - agent-cli-go-github:ci-publish
    options:
      cache: false
