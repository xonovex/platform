apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agenttoolchains.agent.xonovex.com
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
spec:
  group: agent.xonovex.com
  names:
    kind: AgentToolchain
    listKind: AgentToolchainList
    plural: agenttoolchains
    singular: agenttoolchain
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
